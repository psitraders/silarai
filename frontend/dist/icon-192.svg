<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="48" fill="url(#bg)"/>

  <!-- Shopping bag body -->
  <rect x="42" y="78" width="108" height="78" rx="18" fill="white"/>

  <!-- Bag handle -->
  <path d="M66 78 C66 48 126 48 126 78" fill="none" stroke="white" stroke-width="13.2" stroke-linecap="round"/>

  <!-- Three chat / typing dots inside the bag -->
  <circle cx="75"  cy="123" r="9.6" fill="#0d9488"/>
  <circle cx="96"  cy="123" r="9.6" fill="#0d9488"/>
  <circle cx="117" cy="123" r="9.6" fill="#0d9488"/>
</svg>
