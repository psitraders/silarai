<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Shopping bag body -->
  <rect x="7" y="13" width="18" height="13" rx="3" fill="white"/>

  <!-- Bag handle (curved arc above) -->
  <path d="M11 13 C11 8 21 8 21 13" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Three chat / typing dots inside the bag -->
  <circle cx="12.5" cy="20.5" r="1.6" fill="#0d9488"/>
  <circle cx="16"   cy="20.5" r="1.6" fill="#0d9488"/>
  <circle cx="19.5" cy="20.5" r="1.6" fill="#0d9488"/>
</svg>
