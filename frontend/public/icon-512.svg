<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>

  <!-- Shopping bag body -->
  <rect x="112" y="208" width="288" height="208" rx="48" fill="white"/>

  <!-- Bag handle -->
  <path d="M176 208 C176 128 336 128 336 208" fill="none" stroke="white" stroke-width="35.2" stroke-linecap="round"/>

  <!-- Three chat / typing dots inside the bag -->
  <circle cx="200" cy="328" r="25.6" fill="#0d9488"/>
  <circle cx="256" cy="328" r="25.6" fill="#0d9488"/>
  <circle cx="312" cy="328" r="25.6" fill="#0d9488"/>
</svg>
